<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Respira Cali: calidad del aire en tiempo real para Santiago de Cali">
  <title>Respira Cali</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/main.js" defer></script>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Respira Cali</h1>
        <p>Calidad del aire actual de la ciudad de Cali</p>
      </div>
      <button type="button" id="toggle-tema" class="btn-header" aria-label="Cambiar a modo claro">🌙</button>
    </div>

    <form id="filtros" role="search">
      <label for="busqueda">Buscar barrio</label>
      <input id="busqueda" type="search" placeholder="Ej: San Fernando" autocomplete="off">
      <button type="button" id="toggle-temp" class="btn-header" aria-pressed="false">Mostrar °F</button>
    </form>
  </header>
  
  <main id="app">
    <section id="estaciones" aria-live="polite">
      <!-- Aquí renderizamos las tarjetas con JS -->
    </section>
  </main>
  
  <footer>
    <small>Datos: OpenAQ + Open-Meteo | 2026</small>
  </footer>
</body>
</html>
